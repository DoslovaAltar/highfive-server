<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HighFive ✋</title>
    <!-- Vue.js a Socket.io knihovny -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c0c0c;
            color: white;
            touch-action: none;
            overflow: hidden;
        }
        .yellow-glow {
            background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, rgba(12, 12, 12, 1) 80%);
        }
        .hand-emoji {
            font-size: 160px;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            display: inline-block;
            cursor: pointer;
        }
        /* Energická animace z původní verze */
        .active-hand {
            transform: scale(1.4) rotate(-10deg) translateY(-20px);
            filter: drop-shadow(0 0 40px #fbbf24);
        }
        .pulse-waiting {
            animation: pulse-animation 1s infinite ease-in-out;
        }
        @keyframes pulse-animation {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.25); opacity: 1; filter: drop-shadow(0 0 30px #fbbf24); }
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="yellow-glow">

<div id="app" class="h-screen flex flex-col items-center justify-between p-8 relative">
    
    <!-- Status horní lišta -->
    <header class="w-full flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div :class="['w-2 h-2 rounded-full', connected ? 'bg-yellow-400 animate-pulse' : 'bg-red-500']"></div>
            <span class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-60">
                {{ connected ? 'System Live' : 'Connecting Server...' }}
            </span>
        </div>
        <div v-if="joined" class="glass px-4 py-1 rounded-full text-[10px] font-bold italic">
            Místnost: {{ roomId }}
        </div>
    </header>

    <!-- Úvodní přihlášení -->
    <main v-if="!joined" class="flex-1 flex flex-col items-center justify-center w-full max-w-xs">
        <h1 class="text-6xl font-black italic mb-2 tracking-tighter">HIGH<span class="text-yellow-400">5</span></h1>
        <p class="text-white/30 text-xs mb-10 text-center uppercase tracking-widest font-bold">Real-time Handshake</p>
        
        <div class="w-full space-y-4">
            <input v-model="roomId" 
                   maxlength="6" 
                   type="text"
                   placeholder="KÓD" 
                   class="w-full bg-white/5 p-5 rounded-2xl text-center text-3xl font-black tracking-[0.4em] focus:ring-2 focus:ring-yellow-400 outline-none transition-all placeholder:opacity-20">
            
            <button @click="joinRoom" 
                    class="w-full py-5 bg-yellow-400 text-black rounded-2xl font-black text-lg shadow-xl shadow-yellow-400/20 active:scale-95 transition-transform uppercase italic">
                SPOJIT SE
            </button>
        </div>
    </main>

    <!-- Herní plocha -->
    <main v-else class="flex-1 flex flex-col items-center justify-center w-full relative">
        <div class="absolute top-0 text-center">
            <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-yellow-400/50">
                {{ otherActive ? 'Druhý už čeká!' : 'Čeká se na kontakt...' }}
            </p>
        </div>

        <!-- Ruka s animací -->
        <div :class="['hand-emoji', { 'active-hand': amIActive, 'pulse-waiting': otherActive && !amIActive }]"
             @touchstart.prevent="handleStart" 
             @touchend.prevent="handleEnd"
             @mousedown="handleStart"
             @mouseup="handleEnd">
            ✋
        </div>

        <div class="absolute bottom-0 text-center opacity-30">
            <p class="text-[10px] font-bold uppercase tracking-widest animate-pulse">
                {{ amIActive ? 'Držím kontakt...' : 'Polož dlaň na displej' }}
            </p>
        </div>
    </main>

    <!-- Success Overlay -->
    <transition name="fade">
        <div v-if="success" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-yellow-400">
            <div class="text-black text-center animate-bounce">
                <span class="text-9xl">⚡</span>
                <h2 class="text-7xl font-black italic tracking-tighter">BUM!</h2>
                <p class="font-bold uppercase tracking-widest mt-2">Plácnutí proběhlo</p>
            </div>
        </div>
    </transition>

    <footer class="w-full text-center pb-2 opacity-20 text-[8px] uppercase tracking-widest font-bold">
        Build with Vue.js & Socket.io
    </footer>

</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            // Tvá adresa serveru na Renderu
            const SERVER_URL = 'https://highfive-server-tfow.onrender.com';
            const socket = io(SERVER_URL);
            
            const connected = ref(false);
            const joined = ref(false);
            const roomId = ref('');
            const amIActive = ref(false);
            const otherActive = ref(false);
            const success = ref(false);

            // Audio efekt plácnutí
            const slapSound = new Audio('https://www.soundjay.com/human/sounds/slap-01.mp3');
            slapSound.volume = 0.5;

            socket.on('connect', () => {
                connected.value = true;
            });

            socket.on('hand_state', (data) => {
                // Sledujeme pouze zprávy ze stejné místnosti a od jiného uživatele
                if (data.room === roomId.value && data.userId !== socket.id) {
                    otherActive.value = data.active;
                    if (amIActive.value && otherActive.value) {
                        triggerSuccess();
                    }
                }
            });

            const joinRoom = () => {
                if (roomId.value.trim().length >= 3) {
                    joined.value = true;
                }
            };

            const handleStart = () => {
                if (success.value) return;
                amIActive.value = true;
                sendState(true);
                if (otherActive.value) triggerSuccess();
            };

            const handleEnd = () => {
                amIActive.value = false;
                sendState(false);
            };

            const sendState = (active) => {
                socket.emit('hand_state', {
                    room: roomId.value,
                    userId: socket.id,
                    active: active
                });
            };

            const triggerSuccess = () => {
                if (success.value) return;
                success.value = true;

                // Haptická odezva
                if (navigator.vibrate) {
                    navigator.vibrate([100, 30, 200]);
                }

                // Zvuk
                slapSound.play().catch(() => {});

                // Automatický reset po úspěchu
                setTimeout(() => {
                    success.value = false;
                    // Reset stavů pro další pokus
                    amIActive.value = false;
                    sendState(false);
                }, 1500);
            };

            return {
                connected, joined, roomId, amIActive, otherActive, success,
                joinRoom, handleStart, handleEnd
            };
        }
    }).mount('#app');
</script>

</body>
</html>
